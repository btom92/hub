## Customer TODO: Enable and set the TLS certificate configuration as needed.
knime-hub-business-hub-certificate:
  overrides:
    certificate:
      ## Determines if the TLS secret is created by the chart or provided by the customer.
      enabled: false
      ## Retrieve the TLS certificate and private key from a Kubernetes secret.
      secretName: business-hub-certificate
      ## Private key and full chain for certificate are expected to be in 'pem' format and base64-encoded.
      privateKey: ""
      fullChain: ""
    customCa:
      certBundle: ""

## Customer TODO: Optionally disable the external PostgreSQL database initialization jobs. If disabling, the customer is responsible for ensuring that the required databases and roles are created in the PostgreSQL database(s) that are connected to KNIME Business Hub.
## Configuration for connecting to an external PostgreSQL database.
## This chart creates secrets with random credentials and sets up the required databases and roles.
## See README for additional instructions on creating the required secrets in-cluster.
## This is required for the KNIME Business Hub to function.
knime-hub-external-postgres:
  enabled: true

## Customer TODO: Update ingress configuration as needed. The example below is for using the Istio Ingress Gateway (default).
knime-hub-infrastructure:
  overrides:
    ## Ingress is fulfilled by the Istio Ingress Gateway.
    ingress:
      enabled: true
      ## Configuration for the Istio Ingress Class.
      class:
        enabled: true
        name: istio
        controller: istio.io/ingress-controller
      ## Configuration for any chart references to the Istio Ingress Gateway service.
      service:
        URL: istio-ingressgateway.istio-system.svc.cluster.local
        httpPort: 80
        httpsPort: 443
      ## Configuration for the Istio Ingress Gateway.
      gateway:
        enabled: true
        httpsRedirectEnabled: true
        tlsTermination:
          enabled: false
          mode: SIMPLE
          ## TLS Secret must exist in the same namespace as the Istio Ingress Gateway.
          secretName: business-hub-certificate

## Customer TODO: Enable redirection to HTTPS if terminating TLS via the ingress controller.
knime-hub-keycloak:
  overrides:
    ingress:
      sslRedirect: false

