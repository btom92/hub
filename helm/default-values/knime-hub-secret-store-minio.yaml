####################################################################################################
# THIS FILE IS INTENDED TO BE MAINTAINED BY KNIME. SPECIFY OVERRIDES IN THE MAIN VALUES.YAML FILE. #
####################################################################################################

## This is a duplicate installation of the minio chart, which is used to store secrets.
global:
  imagePullSecrets:
    - regcred

nameOverride: "secret-store-minio"

fullnameOverride: "secret-store-minio"

serviceAccount:
  name: "secret-store-minio-sa"

## minio mode, i.e. standalone or distributed or gateway (azure, gcs, nas).
mode: standalone

replicas: 1

## Update strategy for Deployments.
## The Recreate strategy involves terminiating the previous MinIO pod
## before the new pod is created to allow the volume to be remounted if
## scheduled to different node. This may cause a short connection loss
## to MinIO during upgrades, but reduces the possibility of resource and
## volume allocation conflicts during an upgrade. Alternatively, the
## Rolling Update strategy brings a new MinIO with updated configuration
## online before terminating the previous version. Although Rolling Update
## is effective for minimizing any service interuptions during upgrades,
## for MinIO it should only be selected if the cluster consists of exactly
## one node or MinIO can only be deployed on one node due to affinities and/or taints.
## Recreate is set as the default value unless KOTS determines that the
## cluster consists of a single node, in which case Rolling Update becomes the default.
DeploymentUpdate:
  type: Recreate

## persistence needs to be enabled if 'mode == standalone';
## may need to be disabled for 'mode == gateway'.
persistence:
  enabled: true
  size: 100Gi

ingress:
  enabled: false

consoleIngress:
  enabled: false

buckets:
  - name: knime-secret-store-service
    policy: none
    ## Setting this to true will empty this bucket on each deploy/upgrade
    ## which is useful for testing, otherwise leave on false.
    purge: false

policies:
  - name: secretStoreReadWrite
    statements:
      - resources:
          - "arn:aws:s3:::knime-secret-store-service/*"
        actions:
          - "s3:GetObject"
          - "s3:DeleteObject"
          - "s3:PutObject"
      - resources:
          - "arn:aws:s3:::knime-secret-store-service"
        actions:
          - "s3:GetBucketLocation"

users:
  - accessKey: secret-store-service
    existingSecret: secret-store-minio-secret-store-credentials
    existingSecretKey: secretAccessKey
    policy: secretStoreReadWrite

podLabels:
  sidecar.istio.io/inject: "true"

istioAuthorizationPolicy:
  enabled: true
  principals:
    ## Note: `knime-hub` is a namespace reference which would need replaced if the installation namespace is changed.
    - 'cluster.local/ns/knime-hub/sa/secret-store-minio-sa'
    - 'cluster.local/ns/knime-hub/sa/secret-store'