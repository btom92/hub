autoscaling:
  minReplicas: 3
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 75

resources:
  requests:
    cpu: "25m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "128Mi"
