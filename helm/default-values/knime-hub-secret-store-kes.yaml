####################################################################################################
# THIS FILE IS INTENDED TO BE MAINTAINED BY KNIME. SPECIFY OVERRIDES IN THE MAIN VALUES.YAML FILE. #
####################################################################################################

## Setup type (A): Store keys in persistent volume
## Default setup, using a Kubernetes secret as master-key and persistent volume as encrypted storage.
## This setup requires a secret named `secret-store-kes-master-key` with a 32 byte `master-key`.
config:
  keystore:
    encryptedfs:
      masterKeyPath: /app/kes-master-key/master-key
      ## WARNING: do not change the cipher, this will break existing installations!
      masterKeyCipher: AES256
      ## Path in persistent volume to store encryped key-encryption-keys.
      path: /keystore

## Setup type (B.1): Store keys in AWS Secrets Manager
## See documentation: https://docs.min.io/enterprise/aistor-key-manager/legacy-key-management/installation/aws-secrets-manager/
# config:
#   keystore:
#     aws:
#       endpoint: secretsmanager.eu-west-1.amazonaws.com
#       region: eu-west-1
#       kmskey: "arn:aws:kms:eu-west-1:123456789:key/[key-uuid]"
## Optional AWS IAM role for service accounts assignment (IRSA),
## used in service-account annotation and the default credentials provider chain to access the AWS Secrets Manager.
# aws:
#  serviceAccountRoleArn: arn:aws:iam::1234567890:role/secret-store-kes-role


# Setup type (B.2): Store keys in Azure Key Vault
# See documentation: https://docs.min.io/enterprise/minio-kms/legacy-key-management/installation/azure-keyvault/#references
# config:
#   keystore:
#     azure:
#       keyvault:
#         # The KeyVault instance endpoint.
#         endpoint: "https://<KEY_VAULT_INSTANCE>.vault.azure.net"
# # Azure workload identity for service accounts assignment used in service-account annotation
# azure:
#   workloadIdentityClientId: <CLIENT_ID>


## Setup type (C): Store keys in any key store supported by KES
## See documentation: https://docs.min.io/enterprise/aistor-key-manager/legacy-key-management/installation/hashicorp-vault-keystore/#kes-server-setup
# config:
#   ## Specify custom storage configuraions here, they are included in the `keystore` section of the KES config.
#


## Limit access to secret-store service account from the primary installation namespace using Istio.
istioAuthorizationPolicy:
  enabled: true
  principals:
    ## Note: `knime-hub` is a namespace reference which would need replaced if the installation namespace is changed.
    - "cluster.local/ns/knime-hub/sa/secret-store"

controller:
  config:
    kesNamespace: knime-hub
    secretStoreNamespace: knime-hub
