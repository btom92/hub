####################################################################################################
# THIS FILE IS INTENDED TO BE MAINTAINED BY KNIME. SPECIFY OVERRIDES IN THE MAIN VALUES.YAML FILE. #
####################################################################################################

autoscaling:
  minReplicas: 3
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

deployment:
  elasticsearch_url: elasticsearch-master:9200
  licenseFile:
    enabled: true
  resources:
    requests:
      cpu: "50m"
      memory: "1024Mi"
    limits:
      cpu: "1000m"
      memory: "1536Mi"

securityContext:
  initContainerSecurityContext:
    runAsUser: 1337
    runAsGroup: 1337
