####################################################################################################
# THIS FILE IS INTENDED TO BE MAINTAINED BY KNIME. SPECIFY OVERRIDES IN THE MAIN VALUES.YAML FILE. #
####################################################################################################

gateway:
  proxy:
    image: "registry.hubdev.knime.com/knime-hub/istio/proxyv2:1.28.3"
  imagePullSecrets:
    - name: regcred
  name: istio-ingressgateway
  labels:
    app: istio-ingressgateway
    istio: ingressgateway
  autoscaling:
    minReplicas: 1
    maxReplicas: 1
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution: null
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          preference:
            matchExpressions:
              - key: hub.knime.com/role
                operator: In
                values:
                  - core
  tolerations:
    - key: hub.knime.com/role
      value: core
      operator: Equal
      effect: NoSchedule
  service:
    type: NodePort
    ports:
      - name: http2
        nodePort: 30080
        port: 80
        protocol: TCP
        targetPort: 8080
      - name: https
        nodePort: 30443
        port: 443
        protocol: TCP
        targetPort: 8443
