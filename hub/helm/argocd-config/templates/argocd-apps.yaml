apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: knime-business-hub
  namespace: argocd
spec:
  project: default

  source:
    repoURL: {{ .Values.knime.repoUrl }}
    targetRevision: HEAD
    chart: ""
    path: ""
    helm:
      valueFiles: []
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.knime.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  sources:
    - repoURL: {{ .Values.knime.ociRegistry }}
      chart: knime-hub
      targetRevision: {{ .Values.knime.version }}
      helm:
        releaseName: knime-hub
