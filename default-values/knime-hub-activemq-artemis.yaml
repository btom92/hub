####################################################################################################
# THIS FILE IS INTENDED TO BE MAINTAINED BY KNIME. SPECIFY OVERRIDES IN THE MAIN VALUES.YAML FILE. #
####################################################################################################

secretName: knime.artemis.credentials
useExistingSecret: true

metadata:
  pvcAnnotations:
    argocd.argoproj.io/sync-options: Delete=false

## enables message and resource audit via ENABLE_MESSAGE_AUDIT and ENABLE_RESOURCE_AUDIT env vars
enableAudit: false

resources:
  requests:
    cpu: "100m"
    memory: "1024Mi"
  limits:
    cpu: "1000m"
    memory: "1536Mi"
